version: '3.8'

# Compose ini SENGAJA berdiri sendiri (tidak share network dengan
# docker-compose.yml milik backend). Dashboard berkomunikasi ke backend
# lewat browser -> HTTP ke port 8080 yang sudah di-expose ke host,
# jadi tidak perlu Docker network internal yang sama.
#
# Jalankan terpisah dari compose backend:
#   docker-compose -f docker-compose.dashboard.yml up -d --build

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Di-embed ke bundle JS saat build (CRA env var bersifat build-time).
        # Harus alamat yang bisa dijangkau BROWSER pengguna.
        REACT_APP_API_BASE_URL: ${DASHBOARD_API_BASE_URL:-http://localhost:8080/api}
    container_name: auditchain-dashboard
    restart: always
    ports:
      - "3001:80"