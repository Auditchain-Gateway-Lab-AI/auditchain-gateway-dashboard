server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip biar transfer lebih ringan
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — semua route (mis. /dashboard, /login) diarahkan
    # ke index.html supaya react-router-dom yang menangani routing di client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset statis yang sudah di-hash oleh CRA build
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Jangan cache index.html supaya deploy baru langsung kepakai
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}